name: Deploy Portfolio
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run build
        env:
          PUBLIC_STATUS_API_URL: ${{ vars.PUBLIC_STATUS_API_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/

  deploy:
    runs-on: self-hosted
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Deploy container
        run: |
          mkdir -p ~/anis.bouzahar.com
          cp Dockerfile docker-compose.yml nginx.conf ~/anis.bouzahar.com/
          rm -rf ~/anis.bouzahar.com/dist
          cp -r dist ~/anis.bouzahar.com/
          cd ~/anis.bouzahar.com
          docker compose up -d --build
