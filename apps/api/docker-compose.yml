version: '3'

services:
  payload:
    image: oven/bun:1.0
    ports:
      - '3000:3000'
    volumes:
      - .:/home/bun/app
      - node_modules:/home/bun/app/node_modules
    working_dir: /home/bun/app
    command: bun run dev
    depends_on:
      - mongo
      # - postgres
    env_file:
      - .env

  mongo:
    image: mongo:latest
    ports:
      - '27017:27017'
    command:
      - --storageEngine=wiredTiger
    volumes:
      - data:/data/db
    logging:
      driver: none

  # postgres:
  #   restart: always
  #   image: postgres:latest
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  data:
  # pgdata:
  node_modules:
